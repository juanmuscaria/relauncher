name: smoketest

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  natives:
    uses: ./.github/workflows/_natives.yml

  smoketest:
    needs: natives
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.os }}-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}

      - uses: actions/download-artifact@v7
        with:
          name: native-linux-x86_64
          path: prebuild-resources/relauncher-natives/linux-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-linux-aarch64
          path: prebuild-resources/relauncher-natives/linux-aarch64
      - uses: actions/download-artifact@v7
        with:
          name: native-macos-x86_64
          path: prebuild-resources/relauncher-natives/macos-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-macos-aarch64
          path: prebuild-resources/relauncher-natives/macos-aarch64
      - uses: actions/download-artifact@v7
        with:
          name: native-windows-x86_64
          path: prebuild-resources/relauncher-natives/windows-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-windows-aarch64
          path: prebuild-resources/relauncher-natives/windows-aarch64

      - name: Run smoketest
        run: ./gradlew smoketest --stacktrace

      - name: Upload marker artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoketest-markers-${{ matrix.os }}
          path: |
            **/build/smoketest/**
          if-no-files-found: warn
