name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  natives-linux:
    name: Native - Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo install cross --locked
      - run: cross build --target ${{ matrix.target }} --release
        working-directory: native
      - uses: actions/upload-artifact@v6
        with:
          name: native-linux-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/librelauncher_native.so

  natives-macos:
    name: Native - macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
          - arch: aarch64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --target ${{ matrix.target }} --release
        working-directory: native
      - uses: actions/upload-artifact@v6
        with:
          name: native-macos-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/librelauncher_native.dylib

  natives-windows:
    name: Native - Windows (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-pc-windows-msvc
          - arch: aarch64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo install cargo-xwin --locked
      - run: cargo xwin build --target ${{ matrix.target }} --release
        working-directory: native
      - uses: actions/upload-artifact@v6
        with:
          name: native-windows-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/relauncher_native.dll

  build:
    name: Java build
    runs-on: ubuntu-latest
    needs: [natives-linux, natives-macos, natives-windows]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/download-artifact@v7
        with:
          name: native-linux-x86_64
          path: prebuild-resources/relauncher-natives/linux-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-linux-aarch64
          path: prebuild-resources/relauncher-natives/linux-aarch64
      - uses: actions/download-artifact@v7
        with:
          name: native-macos-x86_64
          path: prebuild-resources/relauncher-natives/macos-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-macos-aarch64
          path: prebuild-resources/relauncher-natives/macos-aarch64
      - uses: actions/download-artifact@v7
        with:
          name: native-windows-x86_64
          path: prebuild-resources/relauncher-natives/windows-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-windows-aarch64
          path: prebuild-resources/relauncher-natives/windows-aarch64

      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew build
      - uses: actions/upload-artifact@v6
        with:
          name: relauncher-minecraft
          path: relauncher-minecraft/build/libs/relauncher-minecraft-*.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: relauncher-hytale
          path: relauncher-hytale/build/libs/relauncher-hytale-*.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: relauncher-universal
          path: relauncher-universal/build/libs/relauncher-universal-*.jar
          if-no-files-found: error
