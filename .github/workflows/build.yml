name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  natives:
    uses: ./.github/workflows/_natives.yml

  build:
    name: Java build
    runs-on: ubuntu-latest
    needs: natives
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/download-artifact@v7
        with:
          name: native-linux-x86_64
          path: prebuild-resources/relauncher-natives/linux-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-linux-aarch64
          path: prebuild-resources/relauncher-natives/linux-aarch64
      - uses: actions/download-artifact@v7
        with:
          name: native-macos-x86_64
          path: prebuild-resources/relauncher-natives/macos-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-macos-aarch64
          path: prebuild-resources/relauncher-natives/macos-aarch64
      - uses: actions/download-artifact@v7
        with:
          name: native-windows-x86_64
          path: prebuild-resources/relauncher-natives/windows-x86_64
      - uses: actions/download-artifact@v7
        with:
          name: native-windows-aarch64
          path: prebuild-resources/relauncher-natives/windows-aarch64

      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew build
      - uses: actions/upload-artifact@v6
        with:
          name: relauncher-minecraft
          path: relauncher-minecraft/build/libs/relauncher-minecraft-*.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: relauncher-hytale
          path: relauncher-hytale/build/libs/relauncher-hytale-*.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: relauncher-universal
          path: relauncher-universal/build/libs/relauncher-universal-*.jar
          if-no-files-found: error
